<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>משחק המספרים</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #111827;
      color: white;
      text-align: center;
      margin: 0;
      padding: 20px;
    }

    h1 {
      color: #38bdf8;
    }

    .board {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 10px;
      margin-top: 20px;
    }

    button.number {
      padding: 18px 0;
      font-size: 22px;
      border: none;
      border-radius: 12px;
      background: #1f2937;
      color: white;
      cursor: pointer;
    }

    button.number:active {
      transform: scale(0.95);
    }

    .main-btn {
      margin-top: 25px;
      padding: 15px 25px;
      font-size: 20px;
      border: none;
      border-radius: 14px;
      background: #22c55e;
      color: white;
      cursor: pointer;
    }

    .hidden {
      display: none;
    }

    .found {
      color: #22c55e;
      font-size: 28px;
      margin-top: 25px;
      font-weight: bold;
    }

    .wrong {
      background: #ef4444 !important;
    }
  </style>
</head>
<body>

  <div id="chooseScreen">
    <h1>בחר מספר 🔢</h1>
    <p>שחקן 1 בוחר מספר כששחקן 2 לא מסתכל 👀</p>
    <div id="chooseBoard" class="board"></div>
  </div>

  <div id="gameScreen" class="hidden">
    <h1>מצא את המספר 🎯</h1>
    <p>שחקן 1 אומר בקול את המספר שבחר</p>
    <div id="gameBoard" class="board"></div>
    <div id="message"></div>
    <button id="nextBtn" class="main-btn hidden">המשך ללוח הבא</button>
  </div>

  <script>
    let selectedNumber = null;
    let currentNumbers = [];

    const chooseScreen = document.getElementById("chooseScreen");
    const gameScreen = document.getElementById("gameScreen");
    const chooseBoard = document.getElementById("chooseBoard");
    const gameBoard = document.getElementById("gameBoard");
    const message = document.getElementById("message");
    const nextBtn = document.getElementById("nextBtn");

    function shuffle(array) {
      return array.sort(() => Math.random() - 0.5);
    }

    function generateNumbers(amount = 25, mustInclude = null) {
      const numbers = [];

      if (mustInclude !== null) {
        numbers.push(mustInclude);
      }

      while (numbers.length < amount) {
        const num = Math.floor(Math.random() * 100);
        if (!numbers.includes(num)) {
          numbers.push(num);
        }
      }

      return shuffle(numbers);
    }

    function createChooseBoard() {
      selectedNumber = null;
      currentNumbers = generateNumbers(25);

      chooseBoard.innerHTML = "";

      currentNumbers.forEach(num => {
        const btn = document.createElement("button");
        btn.className = "number";
        btn.textContent = num;

        btn.onclick = () => {
          selectedNumber = num;
          startGame();
        };

        chooseBoard.appendChild(btn);
      });
    }

    function startGame() {
      chooseScreen.classList.add("hidden");
      gameScreen.classList.remove("hidden");

      message.innerHTML = "";
      nextBtn.classList.add("hidden");

      currentNumbers = generateNumbers(25, selectedNumber);
      gameBoard.innerHTML = "";

      currentNumbers.forEach(num => {
        const btn = document.createElement("button");
        btn.className = "number";
        btn.textContent = num;

        btn.onclick = () => {
          if (num === selectedNumber) {
            message.innerHTML = '<div class="found">המספר נמצא ✅</div>';
            nextBtn.classList.remove("hidden");
          } else {
            btn.classList.add("wrong");
            setTimeout(() => btn.classList.remove("wrong"), 400);
          }
        };

        gameBoard.appendChild(btn);
      });
    }

    nextBtn.onclick = () => {
      gameScreen.classList.add("hidden");
      chooseScreen.classList.remove("hidden");
      createChooseBoard();
    };

    createChooseBoard();
  </script>

</body>
</html>
